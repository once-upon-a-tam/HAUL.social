version: "2"
linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - nilerr
    - ineffassign
    - misspell
    - gosec
    - usestdlibvars
    - canonicalheader
    - nosprintfhostport
    - sloglint
    - nolintlint
    - predeclared
    - recvcheck
    - modernize
    - wastedassign
    - musttag
    - copyloopvar
    - fatcontext
    - perfsprint
    - errname
    - govet
    - staticcheck
    - unused
    - gochecknoinits
    - unconvert
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
    staticcheck:
      checks:
        - all
        - SA1019
        - "-ST1000"
    gosec:
      excludes:
        - G104  # unhandled errors, covered more precisely by errcheck

    nolintlint:
      require-explanation: true   # every //nolint must have a comment explaining why
      allow-unused: false         # fail if a nolint directive suppresses nothing

  exclusions:
    rules:
      - path: (.+)_test\.go 
        linters:
          - unused
      - path: internal/migrations/
        linters:
          - gochecknoinits
formatters:
  enable:
    - gofmt
